# ==========================
# Захист системних директорій WordPress
# ==========================
Options -Indexes

# Заборона прямого доступу до системних папок

RedirectMatch 403 ^/wp-content/uploads/.*\.php$
RedirectMatch 403 ^/wp-config\.php$

# Заборона виконання PHP у чутливих директоріях
<FilesMatch "\.(htaccess|htpasswd|ini|log|conf|env)$">
    Order allow,deny
    Deny from all
</FilesMatch>

# ==========================
# Далі йде система кешу LiteSpeed
# ==========================

# BEGIN LSCACHE
## LITESPEED WP CACHE PLUGIN - Do not edit the contents of this block! ##
<IfModule LiteSpeed>
RewriteEngine on
CacheLookup on
RewriteRule .* - [E=Cache-Control:no-autoflush]
RewriteRule litespeed/debug/.*\.log$ - [F,L]
RewriteRule \.litespeed_conf\.dat - [F,L]

### marker ASYNC start ###
RewriteCond %{REQUEST_URI} /wp-admin/admin-ajax\.php
RewriteCond %{QUERY_STRING} action=async_litespeed
RewriteRule .* - [E=noabort:1]
### marker ASYNC end ###

### marker DROPQS start ###
CacheKeyModify -qs:fbclid
CacheKeyModify -qs:gclid
CacheKeyModify -qs:utm*
CacheKeyModify -qs:_ga
### marker DROPQS end ###

</IfModule>
## LITESPEED WP CACHE PLUGIN - Do not edit the contents of this block! ##
# END LSCACHE

# BEGIN NON_LSCACHE
## LITESPEED WP CACHE PLUGIN - Do not edit the contents of this block! ##
## LITESPEED WP CACHE PLUGIN - Do not edit the contents of this block! ##
# END NON_LSCACHE

############################################
# SAFETY BLOCK – protect homepage
############################################
RewriteEngine On

# Never apply redirects to homepage "/"
RewriteCond %{REQUEST_URI} ^/$
RewriteRule .* - [L]

############################################
# 301 redirects (canonical)
############################################
Redirect 301 /likari /likari/
Redirect 301 /poslugi /poslugi/

